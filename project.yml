name: UginsVault
options:
  bundleIdPrefix: com.matiasmaddonni
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en
  xcodeVersion: "2650"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
schemes:
  UginsVault:
    build:
      targets:
        UginsVault: all
        UginsVaultTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - UginsVault
      targets:
        - UginsVaultTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  UginsVault:
    type: application
    platform: iOS
    sources:
      - path: UginsVault
        excludes:
          - "**/.keep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matiasmaddonni.uginsvault
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: "NO"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock your vault with Face ID."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_ASSET_PATHS: "\"UginsVault/Preview Content\""
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  UginsVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - UginsVaultTests
    dependencies:
      - target: UginsVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matiasmaddonni.uginsvault.tests
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UginsVault.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/UginsVault"
